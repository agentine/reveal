name: Publish

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test (normal build)
        run: go test ./... -race -count=1

      - name: Test (safe build)
        run: go test ./... -tags=safe -count=1

      - name: Vet
        run: go vet ./...

  index:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          curl -s "https://proxy.golang.org/github.com/agentine/reveal/@v/${VERSION}.info" || true
          curl -s "https://sum.golang.org/lookup/github.com/agentine/reveal@${VERSION}" || true
          echo "Requested indexing for github.com/agentine/reveal@${VERSION}"
          echo "pkg.go.dev: https://pkg.go.dev/github.com/agentine/reveal@${VERSION}"
